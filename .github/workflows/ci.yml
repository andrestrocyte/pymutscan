name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and development tools
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests scripts
      - name: Unit and integration tests
        run: python -m unittest discover -s tests -v
      - name: Byte-compile package
        run: python -m compileall -q src tests scripts
      - name: Radius-two correctness and memory smoke benchmark
        if: matrix.python-version == '3.12'
        run: |
          python scripts/benchmark_algorithms.py \
            --sizes 100 300 --repeats 1 --profile-size 500 \
            --output /tmp/search-benchmark.json \
            --dataset-output /tmp/radius2-validation.tsv.gz

  notebooks:
    name: Execute example notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install notebook dependencies
        run: python -m pip install -e ".[notebooks]"
      - name: Generate deterministic example FASTQs
        run: python scripts/generate_synthetic_mapseq.py
      - name: Execute notebooks top-to-bottom
        run: |
          for notebook in notebooks/*.ipynb; do
            jupyter nbconvert --to notebook --execute --inplace \
              --ExecutePreprocessor.timeout=180 "$notebook"
          done

  package:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build wheel and source distribution
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
